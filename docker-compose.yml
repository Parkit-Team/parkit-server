version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: parkit-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: parkit-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: parkit_user
      POSTGRES_PASSWORD: parkit_password
      POSTGRES_DB: parkit_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: parkit-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mongodb_data:
  postgres_data:
  redis_data:
