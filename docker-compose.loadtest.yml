version: '3.8'

services:

  kafka:
    image: bitnami/kafka:3.7
    container_name: parkit-kafka
    ports:
      - "9092:9092"
    environment:
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      # Dual listener: host(local) + docker network(internal)
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,INTERNAL://:9094,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092,INTERNAL://kafka:9094
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_CFG_NUM_PARTITIONS=3
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: parkit-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  kcat:
    image: edenhill/kcat:1.7.1
    depends_on:
      - kafka
    entrypoint:
      - sh
      - -c
      - |
        kcat -P -b "${BOOTSTRAP:-kafka:9094}" -t "${TOPIC:-sensor-topic}" -K :
