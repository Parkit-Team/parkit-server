version: '3.8'

services:
  jenkins:
    build: 
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: parkit-jenkins
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      # 도커 데몬 소켓 공유 (Jenkins 내부에서 host의 도커 사용)
      - //var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  jenkins_data:
